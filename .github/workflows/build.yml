name: Build BounceCursor

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Publish
      run: dotnet publish BounceCursor.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=false -o publish

    - name: Zip publish folder
      run: |
        cd publish
        Compress-Archive -Path * -DestinationPath ../BounceCursor.zip
      shell: pwsh

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: BounceCursor-zip
        path: BounceCursor.zip

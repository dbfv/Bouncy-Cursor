name: Build Bouncy Cursor

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
  
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Publish
      run: dotnet publish BounceCursor.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o publish
  
    - name: Zip Release Folder
      run: Compress-Archive -Path publish\* -DestinationPath "Bouncy Cursor.zip"
      shell: pwsh
  
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: "Bouncy Cursor.zip"
        tag_name: "1.0.0"
        name: "Release 1.0.0 🚀"
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
